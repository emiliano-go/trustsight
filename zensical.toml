[project]
site_name = "trustsight"
site_description = "Audits AUR PKGBUILDs before you update: catches careless malice and structural risk, and tells you what it can't verify."
site_url = "https://trustsight.emiliano-go.com/"
docs_dir = "docs"
site_dir = "site"

copyright = "&copy; 2026 Emiliano Gandini Outeda"

extra_css = ["stylesheets/extra.css"]

# ==============================================================================
# Theme
# ==============================================================================

[project.theme]
variant = "modern"
custom_dir = "overrides"
favicon = "assets/images/favicon.png"

font.text = "Ubuntu"
font.code = "JetBrains Mono"

features = [
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.tabs",
    "navigation.indexes",
    "navigation.top",
    "navigation.footer",
    "search.suggest",
    "search.highlight",
    "content.code.copy",
    "content.code.annotate",
    "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ==============================================================================
# Footer / extra
# ==============================================================================

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/emiliano-go/trustsight"
name = "trustsight on GitHub"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/trustsight/"
name = "trustsight on PyPI"

